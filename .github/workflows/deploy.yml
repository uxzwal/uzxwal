name: Build & Deploy Portfolio

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  DOCKER_IMAGE: ujjwal-portfolio
  CONTAINER_NAME: ujjwal-portfolio

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t ${{ env.DOCKER_IMAGE }}:latest .
          docker build -t ${{ env.DOCKER_IMAGE }}:${{ github.sha }} .

      - name: Test container starts
        run: |
          docker run -d --name test-container -p 2022:2022 ${{ env.DOCKER_IMAGE }}:latest
          sleep 5
          curl -f http://localhost:2022/ || exit 1
          docker stop test-container
          docker rm test-container

      # ====================================================
      # Deploy to VPS via SSH (uncomment & set GitHub Secrets):
      #   SERVER_HOST, SERVER_USER, SERVER_SSH_KEY
      # ====================================================
