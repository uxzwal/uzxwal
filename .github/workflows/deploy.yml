name: Build & Deploy Portfolio

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: ujjwal-portfolio
  CONTAINER_NAME: ujjwal-portfolio

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t ${{ env.DOCKER_IMAGE }}:latest .
          docker build -t ${{ env.DOCKER_IMAGE }}:${{ github.sha }} .

      # ====================================================
      # OPTION A: Deploy to your own VPS/Server via SSH
      # Uncomment the block below and set these GitHub Secrets:
      #   - SERVER_HOST: your server IP (e.g., 13.233.x.x)
      #   - SERVER_USER: ssh user (e.g., ubuntu)
      #   - SERVER_SSH_KEY: your private SSH key
      # ====================================================
      # - name: Deploy to Server via SSH
      #   uses: appleboy/ssh-action@v1
      #   with:
      #     host: ${{ secrets.SERVER_HOST }}
      #     username: ${{ secrets.SERVER_USER }}
      #     key: ${{ secrets.SERVER_SSH_KEY }}
      #     script: |
      #       cd ~/portfolio
      #       git pull origin main
      #       docker compose down
      #       docker compose up -d --build
      #       docker image prune -f

      # ====================================================
      # OPTION B: Push to Docker Hub, then deploy
      # Uncomment below and set these GitHub Secrets:
      #   - DOCKERHUB_USERNAME: your Docker Hub username
      #   - DOCKERHUB_TOKEN: your Docker Hub access token
      # ====================================================
      # - name: Login to Docker Hub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKERHUB_USERNAME }}
      #     password: ${{ secrets.DOCKERHUB_TOKEN }}
      #
      # - name: Push to Docker Hub
      #   run: |
      #     docker tag ${{ env.DOCKER_IMAGE }}:latest ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE }}:latest
      #     docker tag ${{ env.DOCKER_IMAGE }}:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE }}:${{ github.sha }}
      #     docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE }}:latest
      #     docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE }}:${{ github.sha }}

      - name: Build Success
        run: echo "✅ Docker image built successfully! Image - ${{ env.DOCKER_IMAGE }}:${{ github.sha }}"
